<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性向測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0; font-family:"Noto Sans TC",sans-serif;
    background:linear-gradient(135deg,#b3e5fc,#e1f5fe);
    display:flex; justify-content:center; align-items:center; min-height:100vh;
}
.container{
    position: relative;
    background:white; width:90%; max-width:500px; border-radius:20px; padding:30px; text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15); background-size: cover; background-position: center; transition: background 0.5s ease;
}
.home-banner { width: 100%; max-width: 100%; height: auto; border-radius: 15px; margin-bottom: 15px; display: block; }
h1{ color:#1976d2; margin-top: 5px; }
input{ width:90%; padding:12px; margin:10px 0 20px; font-size:18px; border-radius:10px; border:2px solid #90caf9; text-align:center; }
button{ background:#2196f3; color:white; border:none; padding:12px 25px; font-size:18px; border-radius:10px; cursor:pointer; transition:.3s; margin: 5px; }
button:hover{ background:#1976d2; }
#resultPage{ display:none; }
.result-box { background: rgba(255, 255, 255, 0.85); padding: 30px 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
.resultTitle{ font-size:28px; color:#1565c0; margin-bottom:20px; font-weight:bold; }
.resultText{ font-size:22px; line-height:1.8;padding: 0 10px; }
#qrcode {
    position: absolute;  /* 👈 啟用絕對定位 */
    right: 20px;        /* 👈 距離右邊邊界 20px */
    bottom: 20px;       /* 👈 距離底部邊界 20px */
    background: white;   /* 加上白色背景，在任何暗色底圖上都清晰 */
    padding: 6px;        /* QR Code 周圍的白邊襯底 */
    border-radius: 8px;  /* 讓 QR Code 邊角帶點圓弧 */
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* 微微的陰影更有質感 */
}
#resultPage button {
margin-top: 10px;
}
</style>
</head>
<body>

<div class="container" id="mainContainer">

    <div id="homePage">
        <!-- 📝【預留路徑】首頁圖 -->
        <img src="images/home_banner.png" alt="首頁設計圖" class="home-banner" id="homeImg">
        <h1>🌦️ 性向測驗</h1>
        <h3>閃電次數(A)</h3>
        <input type="number" id="A">
        <h3>雨量儀顯示次數(B)</h3>
        <input type="number" id="B">
        <button onclick="startTest()">開始測驗</button>
    </div>

    <div id="resultPage">
        <div class="result-box">
            <div class="resultTitle" id="title"></div>
            <div class="resultText" id="text"></div>
        </div>
        <h3>📱 掃描 QR Code 用手機下載結果圖</h3>
        <div id="qrcode"></div>
        <br>
        <button onclick="goHome()">回首頁</button>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ==========================================
// 🎨 全域設定區：未來修改檔名、文字，只需改這裡！
// ==========================================
const config = {
    homeImage: "images/home_banner.png", // 首頁圖路徑
    results: {
        type1: {
            title: "你/妳是...【晴天的魔術師】",
            text: "思考敏捷又台風穩健，做事兼具效率與高品質的實力派。",
            bg: "images/bg_sunny.png" // 📝【預留路徑】
        },
        type2: {
            title: "你/妳是...【細心的小偵探】",
            text: "能觀察到雲的千變萬化，會注意到大家沒發現的蛛絲馬跡。",
            bg: "images/bg_cloudy.png" // 📝【預留路徑】
        },
        type3: {
            title: "你/妳就像雷電一樣",
            text: "是充滿熱情活力的賽車手，常帶給身邊的人歡笑和驚喜。",
            bg: "images/bg_thunder.png" // 📝【預留路徑】
        },
        type4: {
            title: "你/妳是...【有幽默感的藝術家】",
            text: "即使在大雨中仍保有幽默感，內心住著浪漫的靈魂。",
            bg: "images/bg_rainy.png" // 📝【預留路徑】
        }
    }
};

// 載入首頁圖
document.getElementById("homeImg").src = config.homeImage;

function startTest(){
    let A = parseInt(document.getElementById("A").value);
    let B = parseInt(document.getElementById("B").value);

    if(isNaN(A) || isNaN(B)){
        alert("請輸入數字！");
        return;
    }

    // 依據條件撈取 config 內的資料物件
    let resData;
    if(A <= 3 && B <= 13)      resData = config.results.type1;
    else if(A <= 3 && B > 13)  resData = config.results.type2;
    else if(A > 3 && B <= 13)  resData = config.results.type3;
    else                       resData = config.results.type4;

    // 更新現場畫面
    document.getElementById("mainContainer").style.backgroundImage = `url('${resData.bg}')`;
    document.getElementById("title").innerHTML = resData.title;
    document.getElementById("text").innerHTML = resData.text;

    document.getElementById("homePage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
    document.getElementById("qrcode").innerHTML = "";

    // 【核心邏輯】把圖片路徑、標題、內文全部編碼進網址參數
    let currentUrl = window.location.href;
    let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
    
    // 使用 encodeURIComponent 確保中文在傳輸時不會壞掉
    let paramBg = encodeURIComponent(resData.bg);
    let paramTitle = encodeURIComponent(resData.title);
    let paramText = encodeURIComponent(resData.text);

    let downloadPageUrl = `${baseUrl}/download.html?bg=${paramBg}&title=${paramTitle}&text=${paramText}`;

    new QRCode(document.getElementById("qrcode"), {
        text: downloadPageUrl,
        width: 120,
        height: 120
    });
}

function goHome(){
    document.getElementById("resultPage").style.display = "none";
    document.getElementById("homePage").style.display = "block";
    document.getElementById("mainContainer").style.backgroundImage = "none";
    document.getElementById("A").value = "";
    document.getElementById("B").value = "";
}
</script>
</body>
</html>
