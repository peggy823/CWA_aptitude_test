<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性向測驗</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:"Noto Sans TC",sans-serif;
    background:linear-gradient(135deg,#b3e5fc,#e1f5fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:500px;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    background-size: cover;
    background-position: center;
    transition: background 0.5s ease;
}

/* 首頁自訂設計圖樣式 */
.home-banner {
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 15px;
    margin-bottom: 15px;
    display: block;
}

h1{
    color:#1976d2;
    margin-top: 5px;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0 20px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #90caf9;
    text-align:center;
}

button{
    background:#2196f3;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    margin: 5px;
}

button:hover{
    background:#1976d2;
}

#resultPage{
    display:none;
}

/* 文字襯底框，確保在各種自訂底圖下都能清晰閱讀文字 */
.result-box {
    background: rgba(255, 255, 255, 0.85);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.resultTitle{
    font-size:28px;
    color:#1565c0;
    margin-bottom:20px;
    font-weight:bold;
}

.resultText{
    font-size:22px;
    line-height:1.8;
}

#qrcode{
    margin:20px auto;
    display: flex;
    justify-content: center;
}

/* 隱藏後台繪圖用的 canvas */
#canvasWorker {
    display: none;
}
</style>
</head>

<body>

<div class="container" id="mainContainer">

<div id="homePage">
<!-- 【首頁設計圖】預留位置：請在 src 填入你的首頁圖片路徑 -->
<img src="images/home_banner.jpg" alt="首頁設計圖" class="home-banner" id="homeImg">

<h1>🌦️ 性向測驗</h1>

<h3>閃電次數(A)</h3>
<input type="number" id="A">

<h3>雨量儀顯示次數(B)</h3>
<input type="number" id="B">

<button onclick="startTest()">開始測驗</button>

</div>

<div id="resultPage">

<div class="result-box">
    <div class="resultTitle" id="title"></div>
    <div class="resultText" id="text"></div>
</div>

<h3>📱 掃描 QR Code 下載您的測驗結果圖</h3>
<div id="qrcode"></div>

<br>
<button onclick="goHome()">回首頁</button>

</div>

</div>

<!-- 後台用來合成底圖與文字的畫布 (寬800 x 高1200，建議你的結果底圖也是這個比例) -->
<canvas id="canvasWorker" width="800" height="1200"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ==========================================
// 📝 圖片路徑指令預留區
// 請將下方的檔案路徑替換成你實際的圖片資料夾與檔名
// ==========================================
const imagesConfig = {
    home: "images/home_banner.jpg",    // 首頁圖片路徑
    bg1:  "images/bg_sunny.jpg",       // 碰少速快 結果底圖路徑
    bg2:  "images/bg_cloudy.jpg",      // 碰少速慢 結果底圖路徑
    bg3:  "images/bg_thunder.jpg",     // 碰多速快 結果底圖路徑
    bg4:  "images/bg_rainy.jpg"        // 碰多速慢 結果底圖路徑
};

// 初始化首頁圖片路徑
document.getElementById("homeImg").src = imagesConfig.home;

function startTest(){
    let A = parseInt(document.getElementById("A").value);
    let B = parseInt(document.getElementById("B").value);

    if(isNaN(A) || isNaN(B)){
        alert("請輸入數字！");
        return;
    }

    let title = "";
    let text = "";
    let bgUrl = "";

    // 根據測驗結果分配對應的文字與預留底圖路徑
    if(A <= 3 && B <= 13){
        title = "碰少速快";
        text = "你是晴天的魔術師，思考敏捷又台風穩健，做事兼具效率與高品質的實力派。";
        bgUrl = imagesConfig.bg1;
    }else if(A <= 3 && B > 13){
        title = "碰少速慢";
        text = "你是細心的小偵探，能觀察到雲的千變萬化，會注意到大家沒發現的蛛絲馬跡。";
        bgUrl = imagesConfig.bg2;
    }else if(A > 3 && B <= 13){
        title = "碰多速快";
        text = "你就像雷電一樣，是充滿熱情活力的賽車手，常帶給身邊的人歡笑和驚喜。";
        bgUrl = imagesConfig.bg3;
    }else{
        title = "碰多速慢";
        text = "你是即使在大雨中仍保有幽默感的藝術家，內心住著浪漫的靈魂。";
        bgUrl = imagesConfig.bg4;
    }

    // 1. 動態更換當前網頁畫面的容器底圖
    document.getElementById("mainContainer").style.backgroundImage = `url('${bgUrl}')`;
    document.getElementById("title").innerHTML = title;
    document.getElementById("text").innerHTML = text;

    // 2. 切換頁面顯示
    document.getElementById("homePage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";
    document.getElementById("qrcode").innerHTML = "正在繪製結果圖，請稍候...";

    // 3. 呼叫後台 Canvas 開始合成底圖與文字，並產生 QR Code
    generateQRCodeWithImage(bgUrl, title, text);
}

// 後台合成圖片並轉為 QR Code 的核心函式
function generateQRCodeWithImage(bgUrl, title, text) {
    const canvas = document.getElementById("canvasWorker");
    const ctx = canvas.getContext("2d");
    const img = new Image();
    
    img.src = bgUrl;
    img.onload = function() {
        // 步驟 A：繪製你提供的自訂底圖
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // 步驟 B：繪製文字的半透明白色襯底框（確保字在任何底圖上都清晰）
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.fillRect(50, 300, canvas.width - 100, 500);
        
        // 步驟 C：寫入結果標題
        ctx.fillStyle = "#1565c0";
        ctx.font = "bold 50px Noto Sans TC, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(title, canvas.width / 2, 420);
        
        // 步驟 D：寫入結果內文（支援自動換行）
        ctx.fillStyle = "#333333";
        ctx.font = "36px Noto Sans TC, sans-serif";
        wrapText(ctx, text, canvas.width / 2, 520, canvas.width - 200, 60);
        
        // 步驟 E：將整張合成圖轉成 Base64 資料網址
        const imageDataUrl = canvas.toDataURL("image/jpeg", 0.8); // 0.8 為圖片壓縮品質
        
        // 步驟 F：清空文字提示，將圖檔網址直接塞入 QR Code
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: imageDataUrl,
            width: 200,
            height: 200
        });
    };
    
    // 預防圖片載入失敗的防錯機制
    img.onerror = function() {
        document.getElementById("qrcode").innerHTML = "圖片載入失敗，請檢查圖片路徑是否正確。";
    };
}

// 輔助功能：讓 Canvas 內的文字能根據寬度自動換行
function wrapText(context, text, x, y, maxWidth, lineHeight) {
    let words = text.split('');
    let line = '';

    for(let n = 0; n < words.length; n++) {
        let testLine = line + words[n];
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, y);
            line = words[n];
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, y);
}

function goHome(){
    document.getElementById("resultPage").style.display = "none";
    document.getElementById("homePage").style.display = "block";

    // 還原網頁背景為預設值
    document.getElementById("mainContainer").style.backgroundImage = "none";

    document.getElementById("A").value = "";
    document.getElementById("B").value = "";
}
</script>

</body>
</html>
