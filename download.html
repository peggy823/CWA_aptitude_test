<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下載您的測驗結果</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0; padding: 20px; font-family: "Noto Sans TC", sans-serif;
    background: #f0f4f8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
}
.info-text { margin-bottom: 15px; font-size: 16px; color: #555; text-align: center; font-weight: bold; padding: 0 10px; line-height: 1.4;}
#finalImage { width: 100%; max-width: 360px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: none; }
#loading { font-size: 18px; color: #1976d2; }
#canvasWorker { display: none; }
</style>
</head>
<body>

<div class="info-text" id="tipText">正在為您準備專屬結果圖...</div>
<div id="loading">圖片生成中...</div>

<img id="finalImage" alt="您的測驗結果">
<canvas id="canvasWorker" width="800" height="1200"></canvas>

<script>
// 1. 取得網址的代號 t (1, 2, 3, 4)
const urlParams = new URLSearchParams(window.location.search);
const type = urlParams.get('t');

// 💡 所有的文字、圖片資料庫（直接在這裡對應，安全又不會出錯）
const dataMap = {
    "1": {
        title: "你/妳是...【晴天的魔術師】",
        text: "思考敏捷又台風穩健，做事兼具效率與高品質的實力派。",
        bg: "images/bg_sunny.png"
    },
    "2": {
        title: "你/妳是...【細心的小偵探】",
        text: "能觀察到雲的千變萬化，會注意到大家沒發現的蛛絲馬跡。",
        bg: "images/bg_cloudy.png"
    },
    "3": {
        title: "你/妳就像雷電一樣",
        text: "是充滿熱情活力的賽車手，常帶隔身邊的人歡笑和驚喜。",
        bg: "images/bg_thunder.png"
    },
    "4": {
        title: "你/妳是...【有幽默感的藝術家】",
        text: "即使在大雨中仍保有幽默感，內心住著浪漫的靈魂。",
        bg: "images/bg_rainy.png"
    }
};

// 2. 撈出對應的資料
const currentData = dataMap[type];

if (currentData) {
    drawAndRender(currentData.bg, currentData.title, currentData.text);
} else {
    document.getElementById("loading").innerText = "讀取資料失敗，請重新從大螢幕掃描 QR Code。";
}

function drawAndRender(bgUrl, title, text) {
    const canvas = document.getElementById("canvasWorker");
    const ctx = canvas.getContext("2d");
    
    // 強制正方形畫布
    canvas.width = 800;
    canvas.height = 800;

    const img = new Image();
    img.src = bgUrl;
    img.onload = function() {
        // 🎯 完美裁切不拉伸演算法 (Object-fit: cover)
        let imgWidth = img.width;
        let imgHeight = img.height;
        let targetWidth = canvas.width;
        let targetHeight = canvas.height;
        let sx, sy, sWidth, sHeight;
        
        if (imgWidth / imgHeight > targetWidth / targetHeight) {
            sHeight = imgHeight;
            sWidth = imgHeight * (targetWidth / targetHeight);
            sx = (imgWidth - sWidth) / 2;
            sy = 0;
        } else {
            sWidth = imgWidth;
            sHeight = imgWidth * (targetHeight / targetWidth);
            sx = 0;
            sy = (imgHeight - sHeight) / 2;
        }

        // 繪製背景
        ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);
        
        // 繪製文字半透明白框
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.fillRect(60, 220, targetWidth - 120, 360);
        
        // 繪製標題
        ctx.fillStyle = "#1565c0";
        ctx.font = "bold 44px Noto Sans TC, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(title, targetWidth / 2, 320);
        
        // 繪製內文
        ctx.fillStyle = "#333333";
        ctx.font = "32px Noto Sans TC, sans-serif";
        wrapText(ctx, text, targetWidth / 2, 410, targetWidth - 200, 55);
        
        // 輸出實體圖片
        const finalImage = document.getElementById("finalImage");
        finalImage.src = canvas.toDataURL("image/jpeg", 0.9);
        
        document.getElementById("loading").style.display = "none";
        document.getElementById("tipText").innerText = "💡 您的專屬結果圖已生成！請【長按圖片】儲存至手機相簿。";
        finalImage.style.display = "block";
    };
    
    img.onerror = function() {
        document.getElementById("loading").innerText = "結果底圖載入失敗，請確認網頁伺服器上的圖片路徑。";
    };
}

// 自動換行演算法
function wrapText(context, text, x, y, maxWidth, lineHeight) {
    let words = text.split('');
    let line = '';
    for(let n = 0; n < words.length; n++) {
        let testLine = line + words[n];
        let metrics = context.measureText(testLine);
        let testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0) {
            context.fillText(line, x, y);
            line = words[n];
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    context.fillText(line, x, y);
}
</script>
</body>
</html>
